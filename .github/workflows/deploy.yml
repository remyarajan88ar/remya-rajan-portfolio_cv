# GitHub Actions workflow to build and deploy this portfolio to GitHub Pages
name: Build and Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Production Bundle
        run: npm run build
        env:
          # If they want to specify a remote backend API during build, they can add this as a GitHub Secret or Env
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Setup Pages Settings
        uses: actions/configure-pages@v4

      - name: Upload Static Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
